name: Release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  RELEASE_NAME: $(date +'%Y-%m-%d')
  PREVIOUS_RELEASE_NAME: $(date -d 'yesterday' +'%Y-%m-%d')

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        id: install-dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run project command
        id: run-cmd
        run: |
          cd odg
          python __main__.py -r -c

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Constant changes"

      - name: Release preparations
        id: release-prep
        run: |
          cd itembuilds
          zip -q -r ../itembuilds.zip .
          cd ..
          echo "RELEASE_NAME=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_NAME }}
          body: Daily release
          files: itembuilds.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Build Docs
        run: |
          mkdir -p docs/public/itembuilds
          cp -r itembuilds/* docs/public/itembuilds/
          cd docs
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Cleanup
        run: |
          rm -r data itembuilds
          rm odg.log itembuilds.zip
